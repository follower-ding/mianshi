name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  api:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: mianshi
          POSTGRES_PASSWORD: mianshi
          POSTGRES_DB: mianshi
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U mianshi -d mianshi"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: mianshi-api/package-lock.json
      - name: Install API deps
        working-directory: mianshi-api
        run: npm ci
      - name: Typecheck API
        working-directory: mianshi-api
        run: npm run typecheck
      - name: Quality regression
        working-directory: mianshi-api
        run: npm run quality:regression
      - name: Quiz score regression
        working-directory: mianshi-api
        run: npm run test:quiz-score
      - name: Resume field coverage regression
        working-directory: mianshi-api
        run: npm run test:resume-field-coverage
      - name: Smart import regression
        working-directory: mianshi-api
        run: npm run test:smart-import-batch
      - name: Resume all regression
        working-directory: mianshi-api
        run: npm run test:resume-all
      - name: Build API
        working-directory: mianshi-api
        env:
          DATABASE_URL: postgresql://mianshi:mianshi@localhost:5432/mianshi
          JWT_SECRET: ci-test-secret
        run: npm run build

  frontend:
    runs-on: ubuntu-latest
    needs: api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: mianshi-frontend/package-lock.json
      - name: Install frontend deps
        working-directory: mianshi-frontend
        run: npm ci
      - name: Build frontend
        working-directory: mianshi-frontend
        run: npm run build
      - name: Check bundle size
        working-directory: mianshi-frontend
        run: npm run check:bundles

  e2e:
    runs-on: ubuntu-latest
    needs: [api, frontend]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: mianshi
          POSTGRES_PASSWORD: mianshi
          POSTGRES_DB: mianshi
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U mianshi -d mianshi"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install dependencies
        run: |
          cd mianshi-api && npm ci
          cd ../mianshi-frontend && npm ci
      - name: Install Playwright
        working-directory: mianshi-frontend
        run: npx playwright install chromium --with-deps
      - name: Run E2E
        working-directory: mianshi-frontend
        env:
          DATABASE_URL: postgresql://mianshi:mianshi@localhost:5432/mianshi
          JWT_SECRET: ci-test-secret
          ADMIN_EMAIL: admin@mianshi.local
          ADMIN_PASSWORD: admin123456
          CI: 'true'
        run: npm run test:e2e
